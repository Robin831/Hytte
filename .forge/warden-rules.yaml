rules:
    - id: responsive-state-sync
      category: ui
      pattern: UI state (collapsed, hidden, toggled) persisted to localStorage or global state that is shared across breakpoints, while the controls to change that state are only visible at certain breakpoints
      check: Verify that persisted UI state is either independently tracked per breakpoint or that controls to modify the state are accessible at every breakpoint where the state takes effect. If a toggle is hidden on mobile, ensure the shared state is overridden or ignored on mobile so users aren't stuck in an unrecoverable state.
      source: copilot:PR#18
      added: "2026-03-09"
    - id: auth-sign-out-available
      category: ui
      pattern: When navigation or layout components are added or refactored that replace existing authenticated UI elements
      check: Verify that all previously available authentication actions (sign out, profile access, session management) remain accessible to the user and haven't been inadvertently removed
      source: copilot:PR#18
      added: "2026-03-09"
    - id: hide-nav-for-protected-routes
      category: ui
      pattern: Navigation links pointing to protected/authenticated routes
      check: Verify that nav links to protected routes are only rendered when the user is authenticated. Showing links to auth-guarded pages to unauthenticated users creates confusing UX since clicking them just redirects away.
      source: copilot:PR#18
      added: "2026-03-09"
    - id: auth-loading-blank-screen
      category: ui
      pattern: Component returns null or empty fragment while waiting for auth/session state to resolve
      check: Verify that auth-loading gates only protect private routes/sections, not the entire app shell. Public content and layout chrome should remain visible during auth resolution to avoid a blank screen on slow networks.
      source: copilot:PR#18
      added: "2026-03-09"
    - id: layout-height-consistency
      category: ui
      pattern: Components using hard-coded height calculations (e.g. `calc(100vh - Xpx)`) that reference a specific layout element like a header, sidebar, or footer
      check: Verify that all hard-coded height/minHeight calculations referencing layout element dimensions (e.g. header height) remain consistent when the layout structure changes. If a header, sidebar, or other structural element is added, removed, or resized, update all dependent calc() expressions across pages to prevent incorrect spacing or centering offsets.
      source: copilot:PR#18
      added: "2026-03-09"
    - id: unused-imports
      category: style
      pattern: Import statements that bring in symbols not referenced anywhere else in the file
      check: Verify that every imported symbol is actually used in the file; remove or replace any unused imports to pass ESLint/TS unused-import checks
      source: copilot:PR#18
      added: "2026-03-09"
    - id: changelog-matches-implementation
      category: other
      pattern: Changelog or release note entries that describe route access, feature scope, or behavioral changes
      check: Verify that changelog/release note descriptions accurately reflect ALL public routes and actual implementation behavior — no routes or exceptions should be omitted or overstated
      source: copilot:PR#17
      added: "2026-03-09"
    - id: public-route-docs-match
      category: security
      pattern: Routes or pages defined as publicly accessible (unauthenticated) in code
      check: Verify that PR description, changelog, and documentation accurately list ALL routes that are publicly accessible. If code defines additional public routes beyond what is documented, either protect those routes or update the documentation to explicitly mention them as exceptions.
      source: copilot:PR#17
      added: "2026-03-09"
    - id: comment-matches-code-behavior
      category: style
      pattern: Code comments or inline documentation describing route behavior, redirect logic, or conditional flows
      check: Verify that comments accurately describe the actual code behavior — especially for auth redirects and route guards where the real logic may differ from what the comment claims
      source: copilot:PR#17
      added: "2026-03-09"
    - id: unhandled-async-in-useeffect
      category: error-handling
      pattern: useEffect containing async calls, Promise.all, .then() chains, or awaited promises without corresponding .catch() or try/catch error handling
      check: Verify that all async operations inside useEffect have explicit error handling (try/catch or .catch()) so that promise rejections are caught and surfaced to the user rather than silently swallowed or left unhandled
      source: copilot:PR#15
      added: "2026-03-09"
    - id: loading-state-reset-on-error
      category: error-handling
      pattern: A boolean loading/saving state is set to true before an async operation (fetch, axios, etc.) but setSaving(false) or setLoading(false) only appears in the success path, not in a finally block
      check: Verify that any loading/saving/submitting state flag set before an async call is always reset in a `finally` block so the UI never gets permanently stuck in a disabled or spinning state when the request fails
      source: copilot:PR#15
      added: "2026-03-09"
    - id: consistent-time-comparison
      category: other
      pattern: SQL queries using database-native time functions (e.g., datetime('now'), NOW(), CURRENT_TIMESTAMP) mixed with application-level time values in the same codebase
      check: Verify that time comparisons in SQL queries use the same approach as the rest of the codebase. If other queries pass application-level time values (e.g., Go's time.Now()) as parameters, avoid using database-native time functions like datetime('now') which may behave inconsistently depending on how timestamps are stored.
      source: copilot:PR#15
      added: "2026-03-09"
    - id: guard-string-slice-bounds
      category: error-handling
      pattern: Slicing strings or byte slices with hardcoded indices (e.g., s[:N], s[N:]) without verifying the length meets or exceeds the index
      check: Verify that the string/slice length is checked before slicing with a fixed index, or use min(N, len(s)) to prevent out-of-bounds panics
      source: copilot:PR#15
      added: "2026-03-09"
    - id: db-timestamps-use-rfc3339
      category: other
      pattern: Database timestamp columns returned in API responses without explicit format conversion
      check: Verify that timestamp values from the database are parsed into proper time types (e.g., time.Time in Go) and serialized as RFC3339/ISO-8601 strings in JSON responses, rather than passing raw DB format strings that may not be reliably parsed by frontend Date constructors
      source: copilot:PR#15
      added: "2026-03-09"
    - id: new-persistence-logic-needs-tests
      category: testing
      pattern: New functions that read/write to the database (CRUD operations, upsert logic, preference storage)
      check: Verify that new database persistence logic has corresponding unit tests covering insert, update, retrieval, and round-trip behavior, especially when the surrounding package already has an established test suite
      source: copilot:PR#15
      added: "2026-03-09"
    - id: new-handlers-need-tests
      category: testing
      pattern: New HTTP handler functions or endpoints are added without corresponding test files or test functions
      check: Verify that new HTTP handlers have httptest-based test coverage for both success and failure paths, especially when the package already has existing handler tests to follow as examples
      source: copilot:PR#15
      added: "2026-03-09"
    - id: string-match-ordering
      category: other
      pattern: Chain of if-statements or switch cases using substring/includes matching on string codes or identifiers
      check: Verify that more specific substring checks (e.g. 'lightrain', 'heavyrain') appear before general ones (e.g. 'rain') so a broad match does not shadow a narrower, more specific branch
      source: copilot:PR#21
      added: "2026-03-10"
    - id: form-control-accessible-label
      category: ui
      pattern: Form controls (select, input, etc.) rendered without an associated <label> element or aria-label/aria-labelledby attribute
      check: Verify that every interactive form control has an accessible name via a <label>, aria-label, or aria-labelledby so screen readers can announce the control's purpose
      source: copilot:PR#21
      added: "2026-03-10"
    - id: consistent-locale-usage
      category: ui
      pattern: Hardcoded locale strings (e.g. 'en-US', 'nb-NO') passed to toLocaleDateString, toLocaleTimeString, toLocaleString, Intl.DateTimeFormat, or similar Intl APIs
      check: Verify that locale-sensitive formatting methods (toLocaleDateString, toLocaleTimeString, toLocaleString, Intl.NumberFormat, Intl.DateTimeFormat) use undefined as the locale parameter to respect the user's browser locale and remain consistent across the app. Only hardcode a specific locale when there is an explicit product requirement to force one.
      source: copilot:PR#21
      added: "2026-03-10"
    - id: comment-matches-implementation
      category: style
      pattern: Code comments that describe an algorithm or selection strategy (e.g., 'pick the most common', 'find the best match') alongside an implementation that uses a different, simpler heuristic
      check: Verify that comments accurately describe what the code actually does. If the implementation uses a shortcut or approximation instead of the described algorithm, either update the comment to reflect the actual behavior or change the implementation to match the comment.
      source: copilot:PR#21
      added: "2026-03-10"
    - id: limit-reader-silent-truncation
      category: error-handling
      pattern: io.ReadAll(io.LimitReader(...)) or similar patterns that silently truncate large responses without error
      check: Verify that response size limiting detects and returns an error on overflow rather than silently truncating. Use io.LimitedReader with N set to limit+1, then check if bytes read exceed the limit, instead of io.LimitReader which returns truncated data with nil error.
      source: copilot:PR#21
      added: "2026-03-10"
    - id: extend-cache-ttl-on-upstream-failure
      category: error-handling
      pattern: Code that falls back to stale cached data when an upstream/external request fails or returns non-200, without extending the cache expiration
      check: When serving stale cached data due to upstream failures, verify that the cache TTL is extended (e.g. with a shorter stale-if-error duration) to prevent every subsequent request from hammering the failing upstream service
      source: copilot:PR#21
      added: "2026-03-10"
    - id: no-duplicate-constants
      category: other
      pattern: A constant list or enum (e.g. city names, status codes, option values) is defined in more than one file or duplicated between frontend and backend
      check: Verify that shared constant lists are defined in exactly one place — either a shared frontend module or served from an API endpoint — and imported everywhere they are used, so they cannot drift out of sync
      source: copilot:PR#21
      added: "2026-03-10"
    - id: rwlock-read-after-unlock
      category: concurrency
      pattern: Code that calls RUnlock() or Unlock() and then accesses fields that were protected by that lock
      check: Verify that all reads of lock-protected fields occur while the lock is still held. Copy needed values to local variables before releasing the lock to avoid data races with concurrent writers.
      source: copilot:PR#21
      added: "2026-03-10"
    - id: lock-shared-field-reads
      category: concurrency
      pattern: Reading a struct field that is written under a mutex, but without acquiring a read lock first
      check: Verify that every read of a concurrently-mutated field is protected by at least an RLock — copy the value under the lock rather than accessing the live object outside it
      source: copilot:PR#21
      added: "2026-03-10"
    - id: stable-map-iteration-order
      category: ui
      pattern: Iterating over a Go map to build a response slice that is returned to clients or rendered in UI
      check: Verify that slices built from map iteration are sorted before returning, so clients receive a stable, deterministic order across requests
      source: copilot:PR#21
      added: "2026-03-10"
    - id: date-grouping-timezone-aware
      category: ui
      pattern: Code that groups or compares dates using ISO string slicing (e.g., toISOString().slice(0, 10)) or other UTC-based date representations for display purposes
      check: "Verify that date grouping and comparison for UI display uses local date parts (getFullYear/getMonth/getDate) rather than UTC-based methods (toISOString, toUTCString, getUTCDate), so that day boundaries and labels like \"Today\" are correct in the user's time zone"
      source: copilot:PR#21
      added: "2026-03-10"
    - id: reducer-exhaustive-return
      category: error-handling
      pattern: Switch/if-else chains in reducers or state machines that handle action types or message kinds
      check: Verify that all code paths return a value — add a default case that returns current state (or throws for truly unexpected values) so the function never implicitly returns undefined
      source: copilot:PR#29
      added: "2026-03-10"
    - id: background-refresh-preserves-ui
      category: ui
      pattern: Auto-refresh or polling logic that sets a loading/spinner state before fetching new data
      check: Verify that background refreshes (auto-refresh, polling, tab refocus) do not replace already-rendered content with a full loading state. Distinguish initial load from background refresh — keep showing existing data while refreshing, or use a separate subtle indicator (e.g., a `refreshing` flag).
      source: copilot:PR#29
      added: "2026-03-10"
    - id: visibility-aware-interval-init
      category: performance
      pattern: Starting a setInterval or recurring timer unconditionally on component mount without checking current tab visibility
      check: Verify that intervals/timers respect initial visibility state by checking document.hidden (or calling the visibility handler) before starting, so hidden tabs don't trigger unnecessary work until a visibilitychange event fires
      source: copilot:PR#29
      added: "2026-03-10"
    - id: interval-reset-on-user-action
      category: concurrency
      pattern: A timer/interval that should reset when the user performs a manual action (e.g. refresh, selection change) but the interval effect's dependency array does not include the manual-action trigger
      check: When an auto-refresh interval coexists with manual triggers (button clicks, selection changes), verify that user-initiated actions restart/reset the interval so the full delay elapses from the last interaction, rather than firing independently on the original cadence
      source: copilot:PR#29
      added: "2026-03-10"
    - id: prevent-overlapping-fetches-during-refresh
      category: concurrency
      pattern: "Reducer or state logic that conditionally skips setting a loading/fetching flag when prior data exists (e.g. `loading: !state.data` instead of `loading: true`)"
      check: When a fetch/refresh action starts, verify that a loading or in-progress flag is always set to true — even if cached/stale data already exists — so that triggers (buttons, intervals, effects) are properly gated and cannot fire overlapping requests that race against each other.
      source: copilot:PR#29
      added: "2026-03-10"
    - id: preserve-stale-data-on-refresh-error
      category: error-handling
      pattern: Reducer or state handler that clears existing data (sets it to null/undefined) when a background refresh or refetch fails
      check: When a refresh/refetch errors out and valid data is already loaded, verify the reducer preserves the existing data and timestamp instead of nullifying them — surface the error message alongside stale data rather than replacing a working UI with an error-only state
      source: copilot:PR#29
      added: "2026-03-10"
    - id: no-suppress-async-effect-cleanup
      category: concurrency
      pattern: eslint-disable comment suppressing exhaustive-deps or similar warnings on useEffect containing async/fetch calls that set state
      check: Verify that useEffect hooks with async operations include proper cleanup (AbortController or cancelled flag) to prevent state updates after unmount, rather than suppressing lint warnings
      source: copilot:PR#29
      added: "2026-03-10"
    - id: react-namespace-without-import
      category: style
      pattern: TypeScript files using `React.` namespace types (e.g. `React.KeyboardEvent`, `React.ChangeEvent`, `React.FC`) in a way that is inconsistent with the prevailing convention in this repo
      check: "In this codebase, many files rely on globally available React types and use `React.` namespace types without importing `React`. When reviewing changes, ensure each file (and related components) follows a single, consistent convention: either continue using the existing pattern (no explicit `React` import) or explicitly import `React` or the specific types from `react` and update usages accordingly, but avoid mixing conventions within the same area of the UI."
      source: copilot:PR#36
      added: "2026-03-11"
    - id: require-paired-query-params
      category: error-handling
      pattern: Handler accepts two query parameters that only make sense together (e.g., lat/lon, width/height, start/end)
      check: Verify the handler returns 400 Bad Request when exactly one of a required pair of query parameters is provided, instead of silently falling back to a default path
      source: copilot:PR#36
      added: "2026-03-11"
    - id: cache-key-precision
      category: performance
      pattern: Cache keys or deduplication keys derived from numeric values with reduced precision (e.g., rounding floats, truncating decimals)
      check: Verify that cache/singleflight keys preserve enough precision to distinguish all distinct inputs. Rounding or truncating numeric values in keys can cause collisions, returning cached results for the wrong input. Use full-precision representations or validated original strings as keys.
      source: copilot:PR#36
      added: "2026-03-11"
    - id: go-mod-direct-indirect-mismatch
      category: style
      pattern: A package is imported directly in Go source files but marked as `// indirect` in go.mod
      check: Verify that all directly-imported packages are listed in the direct `require` block of go.mod (not marked `// indirect`). Run `go mod tidy` to reconcile.
      source: copilot:PR#36
      added: "2026-03-11"
    - id: validate-coordinate-ranges
      category: error-handling
      pattern: Code that validates or accepts latitude/longitude coordinate values
      check: Verify that coordinate validation checks for finiteness (rejects NaN/Infinity) and valid geographic ranges (lat [-90,90], lon [-180,180]), not just that the values are numbers
      source: copilot:PR#36
      added: "2026-03-11"
    - id: dedupe-by-full-identity
      category: other
      pattern: Code that deduplicates or compares location/place objects using only the name field
      check: Verify that deduplication of location entries uses a composite key (e.g., name+lat+lon or name+country) rather than name alone, since different places can share the same name and single-field matching can silently overwrite distinct entries
      source: copilot:PR#36
      added: "2026-03-11"
    - id: pr-description-matches-shipped-behavior
      category: other
      pattern: PR description, changelog, or commit message references UI components, endpoints, or features
      check: Verify that every feature, component, or endpoint mentioned in the PR description and changelog is actually wired up and reachable in the shipped code. Flag any described functionality that exists only as dead code or is never rendered/called.
      source: copilot:PR#36
      added: "2026-03-11"
    - id: async-data-dependency-race
      category: concurrency
      pattern: Effect or callback that resolves a value by looking up one async result (e.g. a saved preference) inside a collection populated by a separate async call
      check: Verify that the lookup re-runs (or is deferred) until the dependent data set is fully loaded. If the collection hasn't arrived yet the lookup silently returns undefined and may never retry, dropping the user's saved value.
      source: copilot:PR#36
      added: "2026-03-11"
    - id: test-name-matches-behavior
      category: testing
      pattern: Test function name or comment claims to verify specific filtering/suppression behavior
      check: Verify the test actually exercises the claimed behavior path — if the test name says it checks that X suppresses Y, there must be an assertion where X is configured and Y is confirmed absent; if no such assertion exists, either add it or rename the test to match what is actually verified
      source: copilot:PR#57
      added: "2026-03-15"
    - id: no-redundant-params-from-context
      category: other
      pattern: Function accepts parameters that can be derived from another parameter already passed (e.g., event type passed separately alongside headers that contain the same event type)
      check: Verify that function parameters are not redundant with data derivable from other parameters. If a value can be extracted from a map/struct already in scope, derive it internally rather than requiring callers to pass it separately — two sources of truth risk divergence.
      source: copilot:PR#57
      added: "2026-03-15"
    - id: parallel-async-fetches
      category: performance
      pattern: "Independent async operations run sequentially via two distinct anti-patterns: (1) `for...of` or `for` loops with `await` inside — each iteration waits for the previous, stacking latency unnecessarily; (2) `Array.forEach(async ...)` — callbacks are fired without being awaited, so results are silently discarded and errors go unhandled"
      check: "For pattern (1): replace sequential `for...of`/`for` loops with `await Promise.all(items.map(...))` or `Promise.allSettled` so independent operations run in parallel. For pattern (2): replace `forEach(async ...)` with `Promise.all(items.map(async ...))` to ensure all promises are tracked and errors surface properly."
      source: copilot:PR#61
      added: "2026-03-15"
    - id: no-op-promise-resolve
      category: other
      pattern: await Promise.resolve() used inside useEffect callbacks or async functions called from useEffect
      check: Do not assume `await Promise.resolve()` is always a no-op — it yields to the microtask queue and can affect execution ordering. Require an explicit comment explaining the intent whenever it appears. If the goal is to defer work past a React render or browser paint, a macrotask (`setTimeout(fn, 0)`) or `requestAnimationFrame` is more appropriate. Recommend removal only when no rationale is documented and no ordering benefit can be demonstrated.
      source: copilot:PR#61
      added: "2026-03-15"
    - id: json-error-responses
      category: error-handling
      pattern: Handler uses http.Error() to return error responses
      check: "Verify that all error responses use a writeJSON helper (or equivalent) instead of http.Error(), so that errors are returned as application/json with a consistent {\"error\": \"message\"} body rather than text/plain"
      source: copilot:PR#66
      added: "2026-03-15"
    - id: empty-aggregate-status
      category: error-handling
      pattern: Aggregating health/status across a collection of modules or checks, where the aggregate defaults to OK before iterating
      check: When the collection is empty (zero results), verify the aggregate status is set to Unknown/NoData rather than OK, so callers can distinguish 'all checks passed' from 'nothing was checked'
      source: copilot:PR#66
      added: "2026-03-15"
    - id: utc-timestamps
      category: style
      pattern: time.Now().Format(time.RFC3339) used for persistence
      check: Timestamps stored to DB or serialized for persistence should use time.Now().UTC().Format(time.RFC3339) to ensure consistent UTC storage across environments
      source: copilot:PR#66
      added: "2026-03-15"
    - id: parsed-metadata-actually-used
      category: other
      pattern: A parser or extractor populates a field on a struct, but the downstream creation/storage path derives the same value independently
      check: Verify that newly extracted metadata fields (e.g. title, name) are actually consumed in the storage/creation path, with a fallback to the auto-generated value when empty — not silently ignored
      source: copilot:PR#66
      added: "2026-03-15"
    - id: no-duplicate-fetch-logic
      category: style
      pattern: useEffect with inline fetch logic alongside a separate loadAll/fetchAll function that does the same thing
      check: Verify that initial load and refresh share a single fetch helper — no duplicated fetch/error/loading logic between useEffect and a named function
      source: copilot:PR#66
      added: "2026-03-15"
    - id: registry-wiring
      category: other
      pattern: A registry or container is created as a local variable inside a router/handler setup function and passed to handlers without being populated with its dependencies/modules
      check: Verify that registries, containers, or plugin systems created during router setup are either pre-populated before handlers are mounted, or constructed via a factory (e.g. NewDefaultRegistry()) that registers built-ins — and that external packages have a way to register additional entries
      source: copilot:PR#66
      added: "2026-03-15"
    - id: assert-json-decode-error
      category: testing
      pattern: Test code calls json.NewDecoder(...).Decode(&body) without checking the returned error before asserting on decoded fields
      check: Verify that the error returned by Decode is asserted (e.g., require.NoError(t, err) or if err != nil { t.Fatal(...) }) before any assertions on the decoded struct fields
      source: copilot:PR#66
      added: "2026-03-15"
    - id: url-encode-path-params
      category: security
      pattern: String variables interpolated directly into fetch/URL paths (e.g., `/api/${name}`)
      check: Verify that any user-controlled or dynamic string values used in URL path segments are wrapped with `encodeURIComponent()` to prevent routing errors or unintended endpoint access
      source: copilot:PR#66
      added: "2026-03-15"
    - id: empty-slice-not-null
      category: style
      pattern: Slice fields returned in JSON API responses initialized as nil (var s []T or s := []T(nil))
      check: List fields in JSON responses should be initialized as empty slices (make([]T, 0) or []T{}) rather than nil to ensure the API encodes [] instead of null, keeping the response shape consistent for clients
      source: copilot:PR#66
      added: "2026-03-15"
    - id: sqlite-memory-test-db-setup
      category: testing
      pattern: Test helper creates a SQLite `:memory:` database with `sql.Open`
      check: Verify the test DB helper calls `db.SetMaxOpenConns(1)` to prevent multiple connections (each gets its own in-memory DB, causing 'no such table' errors), and registers `t.Cleanup(func(){ db.Close() })` to avoid connection leaks.
      source: copilot:PR#66
      added: "2026-03-15"
    - id: test-ignore-error-return
      category: testing
      pattern: Function calls in test setup (e.g. helpers, DB writes) whose error return values are not checked
      check: Verify all error returns from setup calls (especially DB writes) are handled with t.Fatal or t.Fatalf so test failures are actionable and tests cannot silently pass on setup failure
      source: copilot:PR#66
    - id: sql-rows-close-and-err
      category: error-handling
      pattern: Functions that iterate over sql.Rows using defer rows.Close() and/or an explicit rows.Close() call
      check: Verify rows is closed exactly once (not both deferred and explicitly), and that rows.Err() is checked after the iteration loop to catch scan/iteration errors that would otherwise be silently masked
      source: copilot:PR#68
      added: "2026-03-15"
    - id: silent-db-error-swallow
      category: error-handling
      pattern: Loop over candidate IDs calling a DB fetch, ignoring all errors to skip candidates
      check: Only sql.ErrNoRows should be silently skipped (race with deletion); all other DB errors should be returned or surfaced so callers know results may be incomplete
      source: copilot:PR#68
      added: "2026-03-15"
    - id: test-helper-last-insert-id-error
      category: testing
      pattern: Test helper calls res.LastInsertId() without checking the returned error
      check: Verify that LastInsertId() errors are checked and cause the test to fail immediately, not silently proceed with an invalid ID
      source: copilot:PR#68
      added: "2026-03-15"
    - id: test-timestamp-format-consistency
      category: testing
      pattern: Test inserts rows with SQLite datetime() functions (e.g., datetime('now')) for timestamp columns
      check: Verify that test timestamps use the same format as production code. If production stores RFC3339 strings via Go's time.Time, tests should use explicit RFC3339 literals or call the real Create helper — not SQLite datetime() — to avoid format mismatches in ordering and date functions.
      source: copilot:PR#68
      added: "2026-03-15"
    - id: min-interval-count-before-tagging
      category: other
      pattern: Auto-tag or pattern detection logic that checks group sizes before generating tags
      check: Verify that at least 2 work intervals are required before emitting a tag — single-lap or single-element groups can produce low-signal tags like '1x…' that are misleading
      source: copilot:PR#67
      added: "2026-03-15"
    - id: changelog-scope-accuracy
      category: other
      pattern: Changelog entry describes end-to-end behavior (e.g., 'after import', 'on save') for a PR that only implements a partial layer (logic, tests) without wiring it into the integration path
      check: "Verify changelog wording matches actual PR scope: if the PR only adds logic/tests without wiring into the trigger path (e.g., import handler, event hook), the changelog must say so explicitly rather than implying full end-to-end behavior"
      source: copilot:PR#67
      added: "2026-03-15"
    - id: interval-edge-case-coverage
      category: testing
      pattern: Tests for interval detection or pattern-matching algorithms
      check: "Verify edge cases are covered: intervals where rest duration exceeds work duration, and minimum-count boundaries (e.g., 3-lap edge case) that could emit low-signal or misleading output tags"
      source: copilot:PR#67
      added: "2026-03-15"
    - id: doc-comment-example-accuracy
      category: style
      pattern: Function doc comment contains example output or return values
      check: Verify that example values in doc comments exactly match what the implementation actually returns, including any prefixes, suffixes, or formatting added by the code
      source: copilot:PR#67
      added: "2026-03-15"
    - id: interval-work-rest-heuristic
      category: other
      pattern: Code that classifies interval laps as work/rest by assuming the longer-duration group is always 'work'
      check: Verify that the work/rest heuristic handles cases where rest duration exceeds work duration (e.g., 30s hard / 2m easy). If detected rest > detected work, either bail out or invert the classification to avoid incorrect auto-tags.
      source: copilot:PR#67
      added: "2026-03-15"
    - id: sql-rows-close-and-err
      category: error-handling
      pattern: Functions that iterate over sql.Rows using defer rows.Close() and/or an explicit rows.Close() call
      check: Verify rows is closed exactly once (not both deferred and explicitly), and that rows.Err() is checked after the iteration loop to catch scan/iteration errors that would otherwise be silently masked
      source: copilot:PR#68
      added: "2026-03-15"
    - id: silent-db-error-swallow
      category: error-handling
      pattern: Loop over candidate IDs calling a DB fetch, ignoring all errors to skip candidates
      check: Only sql.ErrNoRows should be silently skipped (race with deletion); all other DB errors should be returned or surfaced so callers know results may be incomplete
      source: copilot:PR#68
      added: "2026-03-15"
    - id: test-helper-last-insert-id-error
      category: testing
      pattern: Test helper calls res.LastInsertId() without checking the returned error
      check: Verify that LastInsertId() errors are checked and cause the test to fail immediately, not silently proceed with an invalid ID
      source: copilot:PR#68
      added: "2026-03-15"
    - id: test-timestamp-format-consistency
      category: testing
      pattern: Test inserts rows with SQLite datetime() functions (e.g., datetime('now')) for timestamp columns
      check: Verify that test timestamps use the same format as production code. If production stores RFC3339 strings via Go's time.Time, tests should use explicit RFC3339 literals or call the real Create helper — not SQLite datetime() — to avoid format mismatches in ordering and date functions.
      source: copilot:PR#68
      added: "2026-03-15"
