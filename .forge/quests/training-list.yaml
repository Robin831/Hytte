name: "Training page loads after login"
description: "Verify authenticated training page renders workout list"
url: "http://localhost:8080"
tags: [smoke, training]
steps:
  - action: navigate
    url: "{{.BaseURL}}/api/auth/test-login"
  - action: wait
    selector: "body"
    timeout: 5s
  - action: navigate
    url: "{{.BaseURL}}/training"
  - action: wait
    selector: "body"
    timeout: 10s
  - action: assert
    selector: "body"
    contains: "Training"
