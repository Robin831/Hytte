name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Frontend install
        run: npm ci
        working-directory: web

      - name: Frontend lint
        run: npm run lint
        working-directory: web

      - name: Frontend build
        run: npm run build
        working-directory: web
