name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: robin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            export PATH=$PATH:/usr/local/go/bin:/home/robin/go/bin
            cd /home/robin/Hytte
            git pull origin main
            cd web && npm ci && nice -n 15 npm run build && cd ..
            nice -n 15 go build -o bin/hytte ./cmd/server
            sudo systemctl restart hytte
            sleep 2
            sudo systemctl is-active hytte
